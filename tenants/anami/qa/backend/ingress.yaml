apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: anami-backend-ingress
  namespace: anami-masoterapia-qa
  annotations:
    kubernetes.io/ingress.class: traefik
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/router.middlewares: kube-system-redirect-https@kubernetescrd
spec:
  tls:
  - hosts:
    - api-qa.temucomasajes.cl # Tu dominio real
    secretName: api-qa-temucomasajes-tls
  rules:
  - host: api-qa.temucomasajes.cl
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: anami-backend-svc
            port:
              number: 80