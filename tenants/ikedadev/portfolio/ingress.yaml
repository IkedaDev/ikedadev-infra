apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: portfolio-ingress
  namespace: ikedadev-apps
  annotations:
    kubernetes.io/ingress.class: traefik
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - me.ikedadev.com
    secretName: me-ikedadev-com-tls 
  rules:
  - host: me.ikedadev.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: portfolio-svc
            port:
              number: 80