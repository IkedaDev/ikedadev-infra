apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: portfolio-ingress
  namespace: ikedadev-apps
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  rules:
  - host: ikedadev.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: portfolio-svc
            port:
              number: 80