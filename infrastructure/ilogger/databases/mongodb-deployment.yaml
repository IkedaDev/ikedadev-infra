apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: ilogger-system
spec:
  strategy:
    type: Recreate # VITAL: Apaga el viejo antes de encender el nuevo
  selector:
    matchLabels:
      app: ilogger-mongodb
  template:
    metadata:
      labels:
        app: ilogger-mongodb
    spec:
      securityContext:
        fsGroup: 999 # Usuario estándar de MongoDB
      containers:
      - name: mongodb
        image: mongo:6.0
        args: 
          - "--bind_ip_all"
          - "--replSet"
          - "rs0"
          - "--keyFile"
          - "/etc/mongo-key/mongodb-keyfile"
        ports:
        - containerPort: 27017
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          value: "ilogger_admin"
        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongodb-secrets
              key: mongodb-root-password
        volumeMounts:
        - name: mongodb-storage
          mountPath: /data/db
          subPath: mongodb-data
        - name: keyfile-volume
          mountPath: /etc/mongo-key
          readOnly: true
      volumes:
      - name: mongodb-storage
        persistentVolumeClaim:
          claimName: mongodb-data-pvc
      - name: keyfile-volume
        secret:
          secretName: mongodb-key-secret
          defaultMode: 0400 # Solo lectura para el usuario 999
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-svc
  namespace: ilogger-system
spec:
  ports:
  - port: 27017
  selector:
    app: ilogger-mongodb