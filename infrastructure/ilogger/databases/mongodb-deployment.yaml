apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: ilogger-system
spec:
  selector:
    matchLabels:
      app: ilogger-mongodb # Etiqueta CLAVE para la política de red
  template:
    metadata:
      labels:
        app: ilogger-mongodb
    spec:
      securityContext:
        fsGroup: 999
      containers:
      - name: mongodb
        image: mongo:6.0
        command: ["mongod", "--bind_ip_all", "--replSet", "rs0"]
        ports:
        - containerPort: 27017
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          value: "ilogger_admin"
        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongodb-secrets
              key: mongodb-root-password
        volumeMounts:
        - name: mongodb-storage
          mountPath: /data/db
          subPath: mongodb-data
      volumes:
      - name: mongodb-storage
        persistentVolumeClaim:
          claimName: mongodb-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-svc
  namespace: ilogger-system
spec:
  ports:
  - port: 27017
  selector:
    app: ilogger-mongodb