apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server-local-ingress
  namespace: argocd
  annotations:
    kubernetes.io/ingress.class: traefik
    # Ahora le decimos a Traefik que hable por HTTP normal con el Pod
    traefik.ingress.kubernetes.io/service.serversscheme: http
spec:
  rules:
  - host: argo.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: argocd-server
            port:
              number: 80 # Argo en modo insecure escucha HTTP acá