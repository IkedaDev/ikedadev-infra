apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server-local-ingress
  namespace: argocd
  annotations:
  kubernetes.io/ingress.class: traefik
  traefik.ingress.kubernetes.io/service.serversscheme: https
  # Prueba con este formato si el anterior falló:
  traefik.ingress.kubernetes.io/service.serverstransport: argocd-argocd-transport@kubernetescrd
spec:
  rules:
  - host: argo.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: argocd-server
            port:
              number: 443