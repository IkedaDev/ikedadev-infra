apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server-local-ingress
  namespace: argocd
  annotations:
    kubernetes.io/ingress.class: traefik
  # 1. Dile a Traefik que use HTTPS para hablar con el Pod
  traefik.ingress.kubernetes.io/service.serversscheme: https
  # 2. Permite que Traefik acepte certificados no válidos del backend (ArgoCD)
  traefik.ingress.kubernetes.io/service.nontlsbackend: "false" 
  # 3. Asegura que el router local use TLS
  traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  rules:
  - host: argo.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: argocd-server
            port:
              name: https