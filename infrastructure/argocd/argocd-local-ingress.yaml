apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server-local-ingress
  namespace: argocd
  annotations:
    kubernetes.io/ingress.class: traefik
    # 1. Obligatorio: Dile a Traefik que hable por HTTPS con el Pod
    traefik.ingress.kubernetes.io/service.serversscheme: https
    # 2. Obligatorio: Ignora que el certificado interno de Argo sea "feo" (auto-firmado)
    traefik.ingress.kubernetes.io/service.nontlsbackend: "false"
spec:
  rules:
  - host: argo.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: argocd-server
            port:
              number: 443 # El servicio que mapea al 8443 interno